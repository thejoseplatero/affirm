name: Deploy to joseplatero.com/affirm
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Same FTP secrets as the story repo, configured separately here
      # (GitHub Actions secrets do not cross repos): FTP_SERVER, FTP_USERNAME, FTP_PASSWORD.
      - name: Sync to joseplatero.com/affirm
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: /public_html/joseplatero.com/affirm/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
